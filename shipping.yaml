- name: shipping module
  hosts: shipping
  become: yes
  vars:
    mysql_password: RoboShop@1
  tasks:
  - name: Install maven for shipping module
    ansible.builtin.package:
      name: maven
      state: present
  
  - name: create roboshop user
    ansible.builtin.user:
      name: roboshop
  
  - name: recursively remove app directory
    ansible.builtin.file: 
      path: /app
      state: absent
  
  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Downloading shipping module zip
    ansible.builtin.get_url:
      url: https://my-roboshop-files.s3.us-east-1.amazonaws.com/shipping.zip
      dest: /tmp/shipping.zip

  - name: unzipping shipping module
    ansible.builtin.unarchive:
      src: /tmp/shipping
      dest: /app
      remote_src: yes
    
  - name: maven clean package 
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app
  
  - name: copy shipping service file
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service
    
  - name: moving target file
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:   
      chdir: /app

  - name: Daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start and enable shipping
    ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes
    
  - name: install mysql
    ansible.builtin.package:
      name: mysql
      state: present

  - name: check cities schema exists or not
    ansible.builtin.command: mysql -h mysql.devopswitharun.online -u root -p{{mysql_password}} -sN -e "SELECT COUNT(*) FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME='cities'"
    register: schema
  
  - name: print output  
    ansible.builtin.debug: 
      msg: "checking cities scehama exists or not : {{schema}}" #0-no cities scehama data 1 present cities schema
  
  - name: loading cities details
    ansible.builtin.shell: "mysql -h mysql.devopswitharun.online -u root -p{{mysql_password}} < /app/schema/shipping.sql"     
    when: schema.stdout != "1"
# here we used shell because we have redirections < with command modue it will not work
  - name: start and enable shipping
    ansible.builtin.service:
      name: shipping
      state: restarted
      enabled: yes

  

