- name: catalogue module
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable default version
    ansible.builtin.shell: dnf module disable nodejs -y ; dnf module enable nodejs:18 -y

  - name: install nodejs 18
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: create roboshop user
    ansible.builtin.user:
      name: roboshop
      #state: absent  --> state: present not required automatically done but if we want to remove absent and remove: yes

  - name: recursively remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Downloading catalogue zip file
    ansible.builtin.get_url:
      url: https://roboshop-builds.s3.amazonaws.com/catalogue.zip
      dest: /tmp/catalogue.zip

  - name: unzip the file
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    ansible.builtin.command: npm install
    args:
      chdir: /app

  - name: copy catalogue service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: Daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start and enable catalogue
    ansible.builtin.service:
      name: catalogue
      state: started 
      enabled: yes

  - name: Copy mongo repo file
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-org-shell
      state: present
      
  - name: check catalogue product count
    # ansible.builtin.command: mongo --host mongodb.devopswitharun.online --quiet --eval 'db = db.getSiblingDb("catalogue"); db.products.count()'
    ansible.builtin.command: mongo --host mongodb.devopswitharun.online/catalogue --quiet --eval 'db.products.count()'
    register: product_count

  - name: print the count
    ansible.builtin.debug:
      msg: "product_count is {{product_count}}"

  - name: load the catalogue data
    ansible.builtin.shell: mongo --host mongodb.devopswitharun.online < /app/schema/catalogue.js
    when: product_count.stdout == "0"
  
  - name: restart and enable
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes

  