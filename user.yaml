- name: user module
  hosts: user
  become: yes
  tasks:
  - name: Disable default version
    ansible.builtin.command: dnf module disable nodejs -y ; dnf module enable nodejs:18 -y

  - name: install nodejs 18
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: create user
    ansible.builtin.user:
      name: roboshop
      #state: absent  --> state: present not required automatically done but if we want to remove absent and remove: yes

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Downloading user zip file
    ansible.builtin.get_url:
      url: https://roboshop-builds.s3.amazonaws.com/user.zip
      dest: /tmp/user.zip

  - name: unzip the file
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    ansible.builtin.command: npm install
    args:
      chdir: /app

  - name: copy user service file
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: Daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true
  - name: Daemon reload

    ansible.builtin.service:
      name: user
      state: started 
      enabled: yes

  - name: Copy mongo repo file
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-org-shell
      state: present
      
  - name: check user product count
    ansible.builtin.command: mongo --host mongodb.devopswitharun.online --quiet --eval 'db.getSiblingDb("user"); db.products.count()'
    register: product_count

  - name: print the count
    ansible.builtin.debug:
      msg: "product_count is {{product_count}}"

  - name: load the user data
    ansible.builtin.command: mongo --host mongodb.devopswitharun.online < /app/schema/user.js
    when: product_count.stdout == "0"
  
  - name: restart and enable
    ansible.builtin.service:
      name: user
      state: restarted
      enabled: yes

  